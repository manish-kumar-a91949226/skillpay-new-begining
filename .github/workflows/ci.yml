name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smart-contract:
    name: Smart Contract CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - name: Cargo fmt
        working-directory: contracts/skillpay-contract
        run: cargo fmt -- --check
      - name: Cargo clippy
        working-directory: contracts/skillpay-contract
        run: cargo clippy -- -D warnings
      - name: Cargo build
        working-directory: contracts/skillpay-contract
        run: cargo build --target wasm32-unknown-unknown --release
      - name: Cargo test
        working-directory: contracts/skillpay-contract
        run: cargo test

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm install
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Build
        working-directory: web
        run: npm run build

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        working-directory: server
        run: npm install
